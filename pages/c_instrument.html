<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>时间段预约</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.9.4/css/bulma.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../assert/css/background.css" />
    <link rel="stylesheet" href="../assert/css/header.css" />
    <link rel="stylesheet" href="../assert/css/instruments.css" />
    <script type="module" src="../assert/js/header.js" defer></script>
  </head>
  <body>
    <header class="navbar">
      <div class="logo">实验平台</div>
    </header>
    <div class="container">
      <div class="box">
        <!-- 桌面端日期控制 -->
        <div
          id="desktop-date-controls"
          class="field has-addons is-justify-content-center mb-4 desktop-only"
        >
          <p class="control">
            <button class="button" id="prevDay">◀ 前一天</button>
          </p>
          <p class="control is-expanded">
            <input class="input has-text-centered" id="dateInput" />
          </p>
          <p class="control">
            <button class="button" id="nextDay">后一天 ▶</button>
          </p>
        </div>

        <!-- 桌面端周视图骨架 -->
        <div id="weeklyView" class="desktop-only">
          <div class="weekly-grid" id="weeklyGrid">
            <div
              class="has-text-centered mb-2 pb-2 week-header"
              style="border-bottom: 2px solid #dbdbdb"
            >
              <strong class="has-text-info">时间</strong>
            </div>
            <div
              class="has-text-centered mb-2 pb-2 week-header"
              data-day-header="0"
              style="border-bottom: 2px solid #dbdbdb"
            >
              <strong>-</strong>
            </div>
            <div
              class="has-text-centered mb-2 pb-2 week-header"
              data-day-header="1"
              style="border-bottom: 2px solid #dbdbdb"
            >
              <strong>-</strong>
            </div>
            <div
              class="has-text-centered mb-2 pb-2 week-header"
              data-day-header="2"
              style="border-bottom: 2px solid #dbdbdb"
            >
              <strong>-</strong>
            </div>
            <div
              class="has-text-centered mb-2 pb-2 week-header"
              data-day-header="3"
              style="border-bottom: 2px solid #dbdbdb"
            >
              <strong>-</strong>
            </div>
            <div
              class="has-text-centered mb-2 pb-2 week-header"
              data-day-header="4"
              style="border-bottom: 2px solid #dbdbdb"
            >
              <strong>-</strong>
            </div>
            <div
              class="has-text-centered mb-2 pb-2 week-header"
              data-day-header="5"
              style="border-bottom: 2px solid #dbdbdb"
            >
              <strong>-</strong>
            </div>
            <div
              class="has-text-centered mb-2 pb-2 week-header"
              data-day-header="6"
              style="border-bottom: 2px solid #dbdbdb"
            >
              <strong>-</strong>
            </div>

            <div class="grid-embedded-btn" id="toggleEarlyBtn">
              展开深夜 (00:00-08:00) ↓
            </div>

            <div class="time-column" id="timeColumn"></div>
            <div class="day-column" data-idx="0"></div>
            <div class="day-column" data-idx="1"></div>
            <div class="day-column" data-idx="2"></div>
            <div class="day-column" data-idx="3"></div>
            <div class="day-column" data-idx="4"></div>
            <div class="day-column" data-idx="5"></div>
            <div class="day-column" data-idx="6"></div>

            <div class="grid-embedded-btn" id="toggleLateBtn">
              展开晚间 (22:00-24:00) ↓
            </div>
          </div>
        </div>

        <!-- 移动端 -->
        <div class="mobile-only">
          <div id="mobileSlots"></div>
          <div
            class="notification is-light mt-4"
            id="mobileSelectionInfo"
            style="display: none"
          >
            <p id="mobileSelectedInfo"></p>
            <button
              class="button is-success is-fullwidth mt-3"
              id="mobileConfirmBtn"
            >
              提交预约
            </button>
            <button
              class="button is-danger is-fullwidth mt-2"
              id="mobileCancelBtn"
            >
              取消预约
            </button>
          </div>
        </div>

        <!-- 选择信息（桌面端） -->
        <div class="desktop-only">
          <div
            class="notification is-light mt-4"
            id="selectionInfo"
            style="display: none"
          >
            <p id="selectedInfo"></p>
          </div>
          <div class="buttons is-centered mt-4">
            <button
              class="button is-success is-medium"
              id="confirmBtn"
              style="display: none"
            >
              提交预约
            </button>
            <button
              class="button is-danger is-medium"
              id="cancelBtn"
              style="display: none"
            >
              取消预约
            </button>
          </div>
        </div>

        <!-- 预约信息 -->
        <div
          class="notification is-info is-light mt-5"
          id="bookingInfo"
          style="display: none"
        >
          <p id="bookingDetails"></p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
    <script type="module" src="../assert/js/new.js"></script>
  </body>
</html>
